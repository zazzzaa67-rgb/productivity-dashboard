<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
        <link rel="stylesheet" href="style.css">
        <title>Productivity Dashboard</title>
        <meta charset="UTF-8">
    </head>
    <body>
        <div class="toggle-btn" id="toggleBtn">
            <div class="circle">
                ☀️
            </div>
        </div>
        <header class="introdution">

            <h1>Productivity dashboard </h1>
            <h2>Build your future </h2>
            <div class="photo2"> 
            </div>
        </header>

            <div class="card" >

                </div>

                    <button class="add">+add task</button>

                </div>

                </div>
            </div>
            <div class="card">

            <div class="card">

                </div>
                <div class="buttons">

                    <button class="delete">-delete tasks</button>
                </div>
            </div>
            <div class="card">
                <h3>Friday</h3>
                <img class="photo1" src="photos/photo1.jpg" alt="set your goals">
                <div class=tasks>
                
                </div>
                <div class="buttons">
                    <button class="add">+add task</button>
                    <button class="delete">-delete tasks</button>
                </div>
            </div>
            <div class="card">
                <h3>Saturday</h3>
                <img class="photo1" src="photos/photo1.jpg" alt="set your goals">
                <div class=tasks>

                <div class="buttons">
                    <button class="add">+add task</button>
                    <button class="delete">-delete tasks</button>
                </div>
            </div>
            <div class="card">
                <h3>Sunday</h3>
                <img class="photo1" src="photos/photo1.jpg" alt="set your goals">
                <div class=tasks>
                    
                </div>

                    <button class="add">+add task</button>
                    <button class="delete">-delete tasks</button>
                </div>

        </section>
        <section class="gym-tracker">
            
            <h2>Gym tracker 💪🏋️‍♀️ </h2>
            <div class="photo3">
            </div>
            <div class="inputs">
                <input class="gym-input" id="the-day" type="string" placeholder=" day of your exercise">
                <input class="gym-input" id="the-exercise" type="string" placeholder="name of your exercise ">
                <input class="gym-input" id="the-waihgt" type="number" placeholder="weight of your exercise">
                <input class="gym-input" id="the-sets" type="number" placeholder="Enter the amount of sets">
                <input class="gym-input" id="more-details" type="string" placeholder="More details(choice)">
            </div>
            <div class="buttons">
                <button id="addg">ADD</button>
                <button id="deleteg">DELETE</button>
            </div>
            <div class="work_out_cards">
                
            </div>
        </section>
        <section class="Notes">
            <h2>Write your Notes</h2>
            <div class="Notesbuttons">
                <button id="addn">+Add</button>
                <button id="deleten">-DELETE</button>
            </div>
            <div id="useNotes">
                <input class="useNotes__useNote" type="string" placeholder="Enter your note ">
            </div>
        </section>
        <footer class="footer">
            <p>

https://www.linkedin.com/in/ahmed-mohamed-b657163a6" target="_blank">Ahmed Mohamed </a>
